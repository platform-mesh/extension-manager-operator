name: auto-labeler

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  auto-labeler:
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: platform-mesh/.github/.github/workflows/job-auto-labeler.yml@75f52df7bff585bcb2d794a7bbeec132354933fb # main
    permissions:
      contents: read
      pull-requests: write
      issues: write
