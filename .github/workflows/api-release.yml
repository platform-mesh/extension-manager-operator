name: api-release

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

permissions:
  contents: read

jobs:
  create-api-version:
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@75f52df7bff585bcb2d794a7bbeec132354933fb # main
    secrets: inherit
    permissions:
      contents: write
    with:
      apiPackagePath: api
