name: ci

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  contents: write
  id-token: write
  issues: write
  packages: write
  pull-requests: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-api-changes:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      api_changed: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            api:
              - 'api/**'

  # ──────────────────────────────────────────────
  # Always-run jobs (PR + main)
  # ──────────────────────────────────────────────
  lint:
    uses: platform-mesh/.github/.github/workflows/job-golang-lint.yml@main
    with:
      useTask: true

  test:
    uses: platform-mesh/.github/.github/workflows/job-golang-test-source.yml@main
    secrets: inherit
    with:
      useTask: true
      useLocalCoverageConfig: true

  docker-build:
    if: github.event_name == 'pull_request'
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@main
    with:
      imageTagName: ghcr.io/platform-mesh/extension-manager-operator
    secrets: inherit

  # ──────────────────────────────────────────────
  # Quality gate (aggregates required checks)
  # ──────────────────────────────────────────────
  quality-gate:
    if: always()
    permissions: {}
    needs: [lint, test, docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "test failed"
            exit 1
          fi
          # docker-build is skipped on main pushes — allow skipped
          if [[ "${{ needs.docker-build.result }}" != "success" && "${{ needs.docker-build.result }}" != "skipped" ]]; then
            echo "docker-build failed"
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Release jobs (main branch only)
  # ──────────────────────────────────────────────
  create-version-with-api:
    if: github.ref == 'refs/heads/main' && needs.detect-api-changes.outputs.api_changed == 'true'
    needs: [detect-api-changes]
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@main
    secrets: inherit
    with:
      apiPackagePath: api

  create-version-without-api:
    if: github.ref == 'refs/heads/main' && needs.detect-api-changes.outputs.api_changed != 'true'
    needs: [detect-api-changes]
    uses: platform-mesh/.github/.github/workflows/job-create-version.yml@main
    secrets: inherit

  create-version:
    if: github.ref == 'refs/heads/main'
    needs: [create-version-with-api, create-version-without-api]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        run: |
          if [[ -n "${{ needs.create-version-with-api.outputs.version }}" ]]; then
            echo "version=${{ needs.create-version-with-api.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ needs.create-version-without-api.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  docker-build-push:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, lint, test]
    uses: platform-mesh/.github/.github/workflows/job-docker-build-push.yml@main
    with:
      imageTagName: ghcr.io/platform-mesh/extension-manager-operator
      version: ${{ needs.create-version.outputs.version }}
      multiarch: true
    secrets: inherit

  update-version:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-chart-version-update.yml@main
    secrets: inherit
    with:
      appVersion: ${{ needs.create-version.outputs.version }}
      chart: extension-manager-operator
      targetRepository: platform-mesh/helm-charts

  sbom:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, docker-build-push]
    uses: platform-mesh/.github/.github/workflows/job-sbom.yml@main
    with:
      imageReference: ghcr.io/platform-mesh/extension-manager-operator:${{ needs.create-version.outputs.version }}

  image-ocm:
    if: github.ref == 'refs/heads/main'
    needs: [create-version, docker-build-push, sbom]
    uses: platform-mesh/.github/.github/workflows/job-image-ocm.yml@main
    secrets: inherit
    with:
      imageReference: ghcr.io/platform-mesh/extension-manager-operator:${{ needs.create-version.outputs.version }}
      appVersion: ${{ needs.create-version.outputs.version }}
      repoName: extension-manager-operator
      commit: ${{ github.sha }}
